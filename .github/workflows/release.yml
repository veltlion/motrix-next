name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles nsis
            label: windows-x86_64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            label: linux-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          export NEEDRESTART_SUSPEND=1
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo -E apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf xdg-utils

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.release.tag_name || '' }}
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: motrix-next-${{ matrix.label }}
          path: "${{ join(fromJSON(steps.tauri.outputs.artifactPaths), '\n') }}"
          retention-days: 7

  merge-updater-json:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Generate and upload channel-specific updater JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            JSON_FILE="beta.json"
          else
            JSON_FILE="latest.json"
          fi

          NOTES=$(gh release view "$TAG" -R "${{ github.repository }}" --json body -q .body || echo "")

          mkdir -p sigs
          gh release download "$TAG" -R "${{ github.repository }}" -p "*.sig" -D sigs

          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }

          WINDOWS_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_x64-setup.exe.sig")
          LINUX_X64_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_amd64.AppImage.sig")
          LINUX_X64_DEB_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_amd64.deb.sig")
          LINUX_X64_RPM_SIG=$(read_sig "sigs/MotrixNext-${VERSION}-1.x86_64.rpm.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "$NOTES" \
            --arg win_sig "$WINDOWS_SIG" \
            --arg win_url "$BASE/MotrixNext_${VERSION}_x64-setup.exe" \
            --arg lx64_sig "$LINUX_X64_SIG" \
            --arg lx64_url "$BASE/MotrixNext_${VERSION}_amd64.AppImage" \
            --arg ldebx64_sig "$LINUX_X64_DEB_SIG" \
            --arg ldebx64_url "$BASE/MotrixNext_${VERSION}_amd64.deb" \
            --arg lrpmx64_sig "$LINUX_X64_RPM_SIG" \
            --arg lrpmx64_url "$BASE/MotrixNext-${VERSION}-1.x86_64.rpm" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $lx64_sig, url: $lx64_url },
                "linux-x86_64-deb": { signature: $ldebx64_sig, url: $ldebx64_url },
                "linux-x86_64-rpm": { signature: $lrpmx64_sig, url: $lrpmx64_url }
              }
            }' > "$JSON_FILE"

          gh release upload updater "$JSON_FILE" --clobber -R "${{ github.repository }}"
